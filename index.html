<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #7a2222;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    embed {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- Replace "resume.pdf" with your actual PDF filename -->
  <embed src="resume.pdf" type="application/pdf" />
</body>
</html>
